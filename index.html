<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= LOGIN SCREEN ================= -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>📚 Student Dashboard</h1>
            <p>Please sign in to track your individual progress.</p>
            <button id="firebaseLoginBtn" class="firebase-login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- ================= DASHBOARD ================= -->
    <div id="dashboard" class="container hidden">

        <!-- ================= HEADER ================= -->

        <header class="dashboard-header">
            
            <div class="header-titles">
                <h1>📚 Student Dashboard</h1>
                <p>IMCA Semester 2 Progress Tracker</p>
            </div>

            <div id="userProfile" class="user-profile">
                <img id="profileImage" src="" alt="Profile Picture" class="profile-img">
                <div class="profile-info">
                    <span id="profileName">User Name</span>
                    <button id="signOutBtn" class="signout-btn">Sign Out</button>
                </div>
            </div>

        </header>

        <!-- ================= OVERALL PROGRESS ================= -->

        <section class="overall-progress-card">

            <div class="card-header">

                <h2>Overall Semester Progress</h2>

                <span id="overallPercentage">0%</span>

            </div>

            <div class="progress-bar">

                <div
                    class="progress-fill"
                    id="overallProgress">
                </div>

            </div>

        </section>

        <!-- ================= STATS ================= -->

        <section class="stats-grid">

            <div class="stat-card">

                <h3>Completed Topics</h3>

                <p id="completedTopics">0</p>

            </div>

            <div class="stat-card">

                <h3>Remaining Topics</h3>

                <p id="remainingTopics">0</p>

            </div>

            <div class="stat-card">

                <h3>Total Subjects</h3>

                <p id="totalSubjects">0</p>

            </div>

            <div class="stat-card">

                <h3>Exam Goal</h3>

                <p>🏆 Top Rank</p>

            </div>

        </section>

        <!-- ================= SUBJECT LIST ================= -->

        <h2 class="section-title">

            Subjects

        </h2>

        <section
            id="subjectsContainer"
            class="subjects-grid">

        </section>

        <!-- ================= SUBJECT PAGE ================= -->

        <section
            id="subjectView"
            class="hidden">

            <button id="backBtn">

                ⬅ Back To Dashboard

            </button>

            <h1 id="subjectTitle"></h1>

            <div id="unitsContainer"></div>

        </section>

    </div>

    <!-- ================= JAVASCRIPT ================= -->

    <script type="module" src="script.js"></script>

</body>

</html>
